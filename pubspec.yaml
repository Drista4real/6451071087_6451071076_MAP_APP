name: ltud_lab
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.8.0
  get: ^4.7.3
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.4.0
  image_picker: ^1.1.2
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  http: ^1.6.0
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/animations/
    - assets/images/banners/
    - assets/images/logos/
    - assets/images/on_boarding_images/
